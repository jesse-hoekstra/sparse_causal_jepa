# Vendored code is exempt from all gates (D5).
exclude: ^src/scjepa/third_party/

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=1000] # papers live in sources/; data/checkpoints are gitignored

  # Keep this rev in sync with the ruff pin in pyproject.toml [project.optional-dependencies].
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.12.3
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  # Local hook (language: system) so pyright runs in the project venv, where
  # torch/scipy/etc. are importable — a mirrored hook env would lack them.
  # Requires `pip install -e ".[dev]"` in the active environment.
  - repo: local
    hooks:
      - id: pyright
        name: pyright (strict)
        entry: pyright
        language: system
        types: [python]
        pass_filenames: false