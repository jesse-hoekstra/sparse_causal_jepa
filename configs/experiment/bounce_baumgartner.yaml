# @package _global_
# EXACT-COMPARISON config: Baumgartner et al. (dynamical_system.pdf) bounce,
# their App. E environment matched as closely as their paper specifies:
#   - 5 balls, elastic collisions, object-level (state) observations
#   - masses ~ non-zero-mean normal (exact params UNSPECIFIED upstream; ours
#     below, clamped to mass_range — flag in any writeup)
#   - radius proportional to mass ("for ease of observation" + variability;
#     deliberately departs from D11 invisibility for this comparison)
#   - attention-logit loss (their Eq. 11; F.4: required against path plateau)
#   - MCC = their F.1 MLP-R² metric (reported as `mcc` by the eval harness)
# Their scale: ~300k steps, 8 seeds (Fig. 17) -> GPU/overnight, not laptop.
# Their reference results (Fig. 3, bounce): SPARTAN MCC ~0.9+.
# The MODEL is still ours (JEPA, D6-D9) — that difference is the experiment.
# Run via: TAU_FACTOR=2.0 bash scripts/run_bounce_example.sh experiment=bounce_baumgartner

defaults:
  - bounce_states

model:
  # SPARTAN App. A.1 Table 3, Interventional Pong column: 3 transformer layers,
  # embedding dim 512, MLP hidden 512, 3 MLP layers (bounce_states shrinks these
  # for CPU smokes — the exact comparison must not inherit that). Their token
  # dim 32 = our param-token dim (slot_size); state tokens are the raw 4-dim GT
  # states under gt_states, lifted 4->512 by the input projection.
  spartan_layers: 3
  spartan_embed_dim: 512
  spartan_mlp_hidden: 512
  # D21: rollout state space = raw GT states (fixed ruler, D20) — only the
  # parameter path (context embed + pooling) and the predictor train.
  gt_states: true

data:
  mass_normal: [1.5, 0.5] # UNSPECIFIED upstream — our choice
  radius_from_mass: true
  # 2026-07-19: 4000 was the initial-commit CPU-era default (20k-step runs,
  # 2x128 model) and was never rescaled. At 300k steps x batch 16 it means
  # ~1200 views per episode; run jkslgj4o showed the Pong-scale model
  # memorizing them (train pred 0.0011 vs held-out 0.0216, eval flat from
  # step 5k) — which poisons tau (held-out-calibrated tau vs a dual driven by
  # memorized train loss). 100k episodes = 3M unique transitions (~48 views
  # each), ~0.7GB cached states-only, one-off generation absorbed into the
  # first epoch. MUST be identical for calibration and main (D12) — pinned
  # here, not on the CLI, so it cannot be forgotten.
  num_clips: 100000

train:
  steps: 300000
  lr: 5.0e-5 # SPARTAN App. A.1 Table 3 (Adam) — overrides bounce_states' CPU value
  # D21: teacher-forced one-step objective (SPARTAN Eq. 7; Baumgartner's Markov
  # MLE factorization — decoder "performs one-step prediction", their Fig. 1).
  # Every transition is anchored at the TRUE state; measured mass-blind floor
  # on the fixed ruler at Tp=1 is 0.199 normalized (scratch audit 2026-07-19),
  # so tau CAN force param edges without the D16 rollout — which remains the
  # ablation via rollout_horizon=null (see D21 for the BPTT stability history).
  rollout_horizon: 1
  # Periodic held-out identifiability eval. The base default is null and earlier
  # launches passed it on the CLI — run 8xjg7ra5 (2026-07-19) silently ran
  # without eval curves because of that. A 300k main run without eval/shd/mcc
  # curves violates the "a metric that CAN leave its failure value MUST be
  # watched" rule, so it is pinned in the experiment config now. Eval is
  # no_grad + shuffle=false and consumes no training RNG: enabling it does not
  # perturb the training trajectory (D12-safe).
  eval_every: 5000
  # Their lambda_logit is unspecified ("small") — knob. Their F.4 warns that
  # UNDERTUNING it makes the path loss plateau (observed: rung1_seed0,
  # 2026-07-11, MCC ~0.01). If a short run shows loss/logit oscillating or
  # loss/logit >> loss/pred after the first ~2k steps, raise this.
  lambda_logit: 1.0e-3
  # Dual timescale (D22, supersedes the F-10 value): 1e-3 was tuned to mimic
  # SPARTAN Fig. 5's lambda trajectories — but that figure is Pong/CREATE at
  # 4e6 steps. Baumgartner's bounce (Fig. 17 x-axis) completes BOTH phases in
  # 300k; run maj7im56 showed 1e-3 spends the entire 300k in phase 1 (lambda
  # monotone to 3.8e5, pruning never engaged, MCC ramp cut off mid-rise at
  # 0.109/0.291). 3e-3 fits the two-phase arc into 300k; still 7x below the
  # F-10 disaster setting (0.02).
  sparsity_step_size: 3.0e-3
  # D22: cap the dual's overshoot. Ascent is unbounded while constraint > tau,
  # but descent is rate-limited by the model's bounded UNDERSHOOT of tau —
  # from 3.8e5 the walk down costs more steps than the run has. 3e4 keeps the
  # reversal within striking distance the moment tau is crossed.
  sparsity_lambda_max: 3.0e4
