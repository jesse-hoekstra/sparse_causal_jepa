# @package _global_
# STAGE-1 JEPA config aligned to Baumgartner et al. (dynamical_system.pdf)
# bounce, matching their App. E environment as closely as specified:
#   - 5 balls, elastic collisions, object-level (state) observations
#   - masses ~ non-zero-mean normal (exact params UNSPECIFIED upstream; ours
#     below, clamped to mass_range — flag in any writeup)
#   - radius proportional to mass ("for ease of observation" + variability;
#     deliberately departs from D11 invisibility for this comparison)
#   - attention-logit loss (their Eq. 11; F.4: required against path plateau)
#   - MCC = their F.1 episode-level MLP-R² metric (`mcc`); the former
#     episode-object probe remains available separately as `mcc_pooled`
# Their scale: ~300k steps, 8 seeds (Fig. 17) -> GPU/overnight, not laptop.
# Their Fig. 3 SPARTAN MCC (~0.9+) is context, not a like-for-like target: the
# MODEL is ours (JEPA, D6-D9), and only the environment/metric are aligned.
# D24 changes the simulator, parameter encoder, pairing, loss, and path objective,
# so every reported run must recalibrate tau under this exact config. Use the
# full same-pipeline lineage in scripts/isambard_pipeline.sbatch.

defaults:
  - bounce_states

model:
  # SPARTAN App. A.1 Table 3, Interventional Pong column: 3 transformer layers,
  # embedding dim 512, MLP hidden 512, 3 MLP layers (bounce_states shrinks these
  # for CPU smokes — this paper-aligned run must not inherit that). Our latent
  # mass itself is scalar (`param_dim: 1` below); it and the raw 4-D GT state
  # tokens are separately projected into the 512-D transformer workspace.
  spartan_layers: 3
  spartan_embed_dim: 512
  spartan_mlp_hidden: 512
  # D21: rollout state space = raw GT states (fixed ruler, D20) — only the
  # parameter path (context embed + pooling) and the predictor train.
  gt_states: true
  # Preserve each object's trajectory while pooling temporal evidence, exchange
  # collision evidence equivariantly across objects, then impose Baumgartner's
  # known q=5 latent dimensionality: one scalar parameter for each of 5 balls.
  pooling_type: track_aware
  param_dim: 1
  spartan_paired_object_attention: true

data:
  mass_normal: [1.5, 0.5] # UNSPECIFIED upstream — our choice
  radius_from_mass: true
  # 2026-07-19: 4000 was the initial-commit CPU-era default (20k-step runs,
  # 2x128 model) and was never rescaled. At 300k steps x batch 16 it means
  # ~1200 views per episode; run jkslgj4o showed the Pong-scale model
  # memorizing them (train pred 0.0011 vs held-out 0.0216, eval flat from
  # step 5k) — which poisons tau (held-out-calibrated tau vs a dual driven by
  # memorized train loss). 100k episodes = 3M unique transitions (~48 views
  # each), ~0.7GB cached states-only, one-off generation absorbed into the
  # first epoch. MUST be identical for calibration and main (D12) — pinned
  # here, not on the CLI, so it cannot be forgotten.
  num_clips: 100000

train:
  # Raw states retain simulator object identity. Do not let a per-transition
  # assignment erase that known correspondence in the diagnostic baseline.
  prediction_matching: aligned
  # Raw-state observations already provide the fixed ruler used in
  # Baumgartner/SPARTAN's reconstruction constraint; use their raw MSE.
  constraint_normalization: raw
  # The unnormalised multi-layer path count otherwise dominates q/k gradients
  # before the GECO controller can react. Train the gated dynamics first, then
  # let the constraint controller begin pruning.
  sparsity_warmup_steps: 10000
  sparsity_lambda_init: 1.0e6
  # Inherited only as a bare-train.py smoke placeholder, now in raw-MSE units.
  # The reporting pipeline always replaces it with the fresh dense reference.
  sparsity_tau: 0.75
  steps: 300000
  lr: 5.0e-5 # SPARTAN App. A.1 Table 3 (Adam) — overrides bounce_states' CPU value
  # D21: teacher-forced one-step objective (SPARTAN Eq. 7; Baumgartner's Markov
  # MLE factorization — decoder "performs one-step prediction", their Fig. 1).
  # Every transition is anchored at the TRUE state. D24 now uses raw MSE and a
  # corrected collision surface, so pre-D24 numeric floors are invalid. The
  # reporting runner trains a matched A≡0 reference (--identity-check) and
  # requires tau below that measured floor before the sparse run begins.
  rollout_horizon: 1
  # Periodic held-out identifiability eval. The base default is null and earlier
  # launches passed it on the CLI — run 8xjg7ra5 (2026-07-19) silently ran
  # without eval curves because of that. A 300k main run without eval/shd/mcc
  # curves violates the "a metric that CAN leave its failure value MUST be
  # watched" rule, so it is pinned in the experiment config now. Eval is
  # no_grad + shuffle=false and consumes no training RNG: enabling it does not
  # perturb the training trajectory (D12-safe).
  eval_every: 5000
  # Their lambda_logit is unspecified ("small") — knob. Their F.4 warns that
  # UNDERTUNING it makes the path loss plateau (observed: rung1_seed0,
  # 2026-07-11, MCC ~0.01). If a short run shows loss/logit oscillating or
  # loss/logit >> loss/pred after the first ~2k steps, raise this.
  lambda_logit: 1.0e-3
  # SPARTAN A.2 / Baumgartner Eq. 10 leave this numerical step unspecified.
  # Keep D23's 2e-2 as a conservative first pilot value, but do NOT treat its
  # old timing evidence as transferable: D24 changed normalized loss to raw
  # MSE and changed the path objective's scale. Watch how quickly lambda leaves
  # 1e6 after the raw constraint crosses tau, then tune before the seed sweep.
  sparsity_step_size: 2.0e-2
  # The papers specify no clamp. We retain the base 1e6 only as a numerical
  # recovery guard; unlike D22's 3e4 cap its initial path weight is just 1e-6.
  # D24 starts at this ceiling and adds the explicit warm-up above.
  sparsity_lambda_max: 1.0e6
